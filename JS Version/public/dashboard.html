<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Dashboard passeggero</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui; }
        body { background: #f0f2f5; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; border-radius: 24px; padding: 24px; }
        .card { background: #e9ecef; padding: 16px; border-radius: 16px; margin-bottom: 20px; }
        button { background: #0066cc; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h2>📋 Ciao, <span id="userName"></span></h2>
    <div class="card"><h3>🎟️ Biglietti attivi</h3><div id="activeTickets"></div></div>
    <div class="card"><h3>📜 Storico viaggi</h3><div id="history"></div></div>
    <div class="card"><h3>⭐ Punti fedeltà</h3><div id="loyalty"></div></div>
</div>
<script>
    const userId = localStorage.getItem('userId');
    if (!userId) window.location.href = 'login.html';
    fetch(`/api/user/dashboard/${userId}`)
        .then(res => res.json())
        .then(data => {
            document.getElementById('userName').innerText = data.name;
            document.getElementById('loyalty').innerText = data.loyaltyPoints + ' punti';
            document.getElementById('activeTickets').innerHTML = data.activeTickets.map(t => `
                <p>✔️ ${t.from} → ${t.to}, partenza ${t.departureTime}, posto ${t.seatNumber}, prezzo ${t.price} €</p>
            `).join('');
            document.getElementById('history').innerHTML = data.history.map(h => `
                <p>📅 ${h.date.slice(0,10)}: ${h.from} → ${h.to} (${h.price} €) - ${h.status}</p>
            `).join('');
        });
</script>
</body>
</html>
