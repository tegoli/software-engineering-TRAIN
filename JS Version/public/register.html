<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">Registrazione - Train App</title>
    <link rel="icon" type="image/png" href="images/104okok.png">

    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #f0f2f5 0%, #e0e5ec 100%); margin: 0; padding: 20px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 500px; width: 100%; background: white; border-radius: 32px; padding: 32px 28px; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2); }
        h2 { text-align: center; color: #1e3c72; font-size: 1.8rem; }
        .sub { text-align: center; color: #5a6874; margin-bottom: 28px; }
        label { font-weight: 600; display: block; margin-top: 18px; margin-bottom: 6px; color: #1e3c72; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 16px; font-size: 1rem; background: #f9fafb; }
        input:focus { outline: none; border-color: #0066cc; box-shadow: 0 0 0 3px rgba(0,102,204,0.2); background: white; }
        button { width: 100%; padding: 12px; background: #0066cc; color: white; font-weight: bold; font-size: 1rem; border: none; border-radius: 40px; margin-top: 28px; cursor: pointer; }
        button:hover { background: #004d99; }
        .message { margin-top: 20px; padding: 12px; border-radius: 16px; text-align: center; }
        .success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #2e7d32; }
        .error { background: #ffebee; color: #c62828; border-left: 4px solid #c62828; }
        .login-link { text-align: center; margin-top: 24px; }
        hr { margin: 24px 0; }
        .info-note { font-size: 0.75rem; color: #6c757d; text-align: center; margin-top: 20px; }
        .lang-selector { position: absolute; top: 20px; right: 20px; }
        .lang-selector select { padding: 5px 8px; border-radius: 20px; background: #e9ecef; border: 1px solid #ccc; cursor: pointer; }
    </style>
</head>
<body>
<div class="lang-selector">
    <select id="langSelect">
        <option value="it">🇮🇹 IT</option>
        <option value="en">🇬🇧 EN</option>
        <option value="de">🇩🇪 DE</option>
    </select>
</div>
<div class="container">
    <h2 data-i18n="title"> Crea un account</h2>
    <div class="sub" data-i18n="sub">Accedi a tutti i servizi di prenotazione</div>
    <div>
        <label data-i18n="name">Nome</label>
        <input type="text" id="name" placeholder="Mario" autocomplete="given-name">
        <label data-i18n="surname">Cognome</label>
        <input type="text" id="surname" placeholder="Rossi" autocomplete="family-name">
        <label data-i18n="email">Email</label>
        <input type="email" id="email" placeholder="mario.rossi@example.com" autocomplete="email">
        <label data-i18n="password">Password</label>
        <input type="password" id="password" placeholder="Almeno 8 caratteri" autocomplete="new-password">
        <label data-i18n="confirm_password">Conferma password</label>
        <input type="password" id="confirmPassword" placeholder="Ripeti la password" autocomplete="off">
        <button id="registerBtn" data-i18n="register_btn"> Registrati</button>
        <div id="message"></div>
    </div>
    <hr>
    <div class="login-link">
        <span data-i18n="have_account">Hai già un account?</span> <a href="login.html" data-i18n="login_link">Accedi qui</a>
    </div>
    <label class="privacy-checkbox">
        <input type="checkbox" name="privacy_policy">
        <p>I've read and accept the Privacy Policy (optional)</p>
      </label>
    <div class="info-note" data-i18n="gdpr_note">La registrazione è gratuita. I tuoi dati saranno trattati in conformità al GDPR.</div>
</div>
<div id="cookieBanner" style="position: fixed; bottom: 0; left: 0; right: 0; background: #333; color: white; padding: 15px; text-align: center; z-index: 1000; display: none;">
    <span data-i18n="cookie_text"> Questo sito utilizza cookie per migliorare l'esperienza.</span>
    <button id="acceptCookies" style="margin-left: 15px;" data-i18n="accept">Accetta</button>
    <button id="rejectCookies" data-i18n="reject">Rifiuta</button>
</div>

<script>
    // ----- TRADUZIONI -----
    const translations = {
        it: { title: " Crea un account", sub: "Accedi a tutti i servizi di prenotazione", name: "Nome", surname: "Cognome", email: "Email", password: "Password", confirm_password: "Conferma password", register_btn: " Registrati", have_account: "Hai già un account?", login_link: "Accedi qui", gdpr_note: "La registrazione è gratuita. I tuoi dati saranno trattati in conformità al GDPR.", cookie_text: " Questo sito utilizza cookie per migliorare l'esperienza.", accept: "Accetta", reject: "Rifiuta" },
        en: { title: " Create an account", sub: "Access all booking services", name: "First name", surname: "Last name", email: "Email", password: "Password", confirm_password: "Confirm password", register_btn: " Register", have_account: "Already have an account?", login_link: "Login here", gdpr_note: "Registration is free. Your data will be processed in accordance with GDPR.", cookie_text: " This site uses cookies to improve your experience.", accept: "Accept", reject: "Reject" },
        de: { title: " Konto erstellen", sub: "Alle Buchungsdienste nutzen", name: "Vorname", surname: "Nachname", email: "E-Mail", password: "Passwort", confirm_password: "Passwort bestätigen", register_btn: " Registrieren", have_account: "Bereits ein Konto?", login_link: "Hier anmelden", gdpr_note: "Die Registrierung ist kostenlos. Ihre Daten werden gemäß der DSGVO verarbeitet.", cookie_text: " Diese Website verwendet Cookies, um Ihr Erlebnis zu verbessern.", accept: "Akzeptieren", reject: "Ablehnen" }
    };
    let currentLang = localStorage.getItem('lang') || 'it';
    function setLanguage(lang) {
        currentLang = lang; localStorage.setItem('lang', lang);
        document.querySelectorAll('[data-i18n]').forEach(el => { const key = el.getAttribute('data-i18n'); if (translations[lang] && translations[lang][key]) el.innerText = translations[lang][key]; });
        const token = localStorage.getItem('token'); if (token) fetch('/api/language', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ language: lang }) }).catch(e=>console.warn);
    }
    document.getElementById('langSelect').value = currentLang; setLanguage(currentLang);
    document.getElementById('langSelect').addEventListener('change', e => setLanguage(e.target.value));

    // ----- LOGICA REGISTRAZIONE -----
    const registerBtn = document.getElementById('registerBtn');
    const messageDiv = document.getElementById('message');
    function showMessage(text, isError = true) {
        messageDiv.innerHTML = `<div class="${isError ? 'error' : 'success'}">${text}</div>`;
        if (!isError) setTimeout(() => window.location.href = 'login.html', 1500);
    }
    async function registerUser(name, surname, email, password) {
        try {
            const response = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, surname, email, password }) });
            const data = await response.json();
            if (data.success) showMessage('✅ Registrazione completata! Redirezione al login...', false);
            else showMessage('❌ ' + (data.message || 'Errore durante la registrazione.'));
        } catch (err) { showMessage('❌ Errore di rete: ' + err.message); }
    }
    registerBtn.addEventListener('click', () => {
        messageDiv.innerHTML = '';
        const name = document.getElementById('name').value.trim();
        const surname = document.getElementById('surname').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;
        if (!name || !surname || !email || !password) { showMessage(' Tutti i campi sono obbligatori.'); return; }
        if (password.length < 8) { showMessage(' La password deve essere lunga almeno 8 caratteri.'); return; }
        if (password !== confirm) { showMessage(' Le password non coincidono.'); return; }
        if (!email.includes('@') || !email.includes('.')) { showMessage(' Inserisci un indirizzo email valido.'); return; }
        registerBtn.disabled = true; registerBtn.textContent = 'Registrazione in corso...';
        registerUser(name, surname, email, password).finally(() => { registerBtn.disabled = false; registerBtn.textContent = ' Registrati'; });
    });
    // Cookie banner
    if (!localStorage.getItem('cookieChoice')) document.getElementById('cookieBanner').style.display = 'block';
    document.getElementById('acceptCookies').onclick = () => {
        localStorage.setItem('cookieChoice', 'accepted');
        document.getElementById('cookieBanner').style.display = 'none';
        alert(translations[currentLang]?.cookie_accept_msg || 'Grazie, i tuoi dati verranno usati per la ricerca del gruppo 104 in un server molto sicuro (quello di Matteo)');
    };
    document.getElementById('rejectCookies').onclick = () => {
        localStorage.setItem('cookieChoice', 'rejected');
        document.getElementById('cookieBanner').style.display = 'none';
        alert(translations[currentLang]?.cookie_reject_msg || 'ok, chill va bene lo stesso :(');
    };
</script>
</body>
</html>
