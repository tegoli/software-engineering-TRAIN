<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">Login - Train App</title>
    <link rel="icon" type="image/png" href="images/104okok.png">

    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #f0f2f5 0%, #e0e5ec 100%); margin: 0; padding: 20px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 500px; width: 100%; background: white; border-radius: 32px; padding: 32px; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2); }
        h2 { text-align: center; color: #1e3c72; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 16px; }
        button { width: 100%; padding: 12px; background: #0066cc; color: white; font-weight: bold; border: none; border-radius: 40px; cursor: pointer; margin-top: 10px; }
        .error { color: #c62828; background: #ffebee; padding: 10px; border-radius: 12px; margin-top: 15px; text-align: center; }
        .success { color: #2e7d32; background: #e8f5e9; padding: 10px; border-radius: 12px; margin-top: 15px; text-align: center; }
        .register-link { text-align: center; margin-top: 20px; }
        hr { margin: 20px 0; }
        .lang-selector { position: absolute; top: 20px; right: 20px; }
        .lang-selector select { padding: 5px 8px; border-radius: 20px; background: #e9ecef; border: 1px solid #ccc; cursor: pointer; }
    </style>
</head>
<body>
<div class="lang-selector">
    <select id="langSelect">
        <option value="it">🇮🇹 IT</option>
        <option value="en">🇬🇧 EN</option>
        <option value="de">🇩🇪 DE</option>
    </select>
</div>
<div class="container">
    <h2 data-i18n="title">🔐 Accesso</h2>
    <input type="email" id="email" placeholder="Email" value="admin@railway.it">
    <input type="password" id="password" placeholder="Password" value="password">
    <button id="loginBtn" data-i18n="login_btn">Accedi</button>
    <div id="message"></div>
    <hr>
    <div class="register-link">
        <span data-i18n="no_account">Non hai un account?</span> <a href="register.html" data-i18n="register_now">Registrati ora</a>
    </div>
    <p style="font-size:0.75rem; text-align:center; margin-top:20px;" data-i18n="demo_note">Demo: puoi registrare un nuovo utente oppure usare admin@railway.it con password "password"</p>
</div>
<div id="cookieBanner" style="position: fixed; bottom: 0; left: 0; right: 0; background: #333; color: white; padding: 15px; text-align: center; z-index: 1000; display: none;">
    <span data-i18n="cookie_text">🍪 Questo sito utilizza cookie per migliorare l'esperienza.</span>
    <button id="acceptCookies" style="margin-left: 15px;" data-i18n="accept">Accetta</button>
    <button id="rejectCookies" data-i18n="reject">Rifiuta</button>
</div>

<script>
    // ----- TRADUZIONI -----
    const translations = {
        it: { 
            title: "🔐 Accesso", 
            login_btn: "Accedi", 
            no_account: "Non hai un account?", 
            register_now: "Registrati ora", 
            demo_note: "Demo4Professor: puoi registrare un nuovo utente oppure usare matteo.golinelli@studenti.unitn.it (ADMIN) con password \"password\" oppure usare robin.bertolini@studenti.unitn.it (INSPECTOR) con password \"password\" oppure usare virginia.ancora@studenti.unitn.it/caterina.alessi@studenti.unitn.it (PASSENGERs) con password \"password2\"", 
            cookie_text: "🍪 Questo sito utilizza cookie per migliorare l'esperienza.", 
            accept: "Accetta", 
            reject: "Rifiuta" 
        },
        en: { 
            title: "🔐 Login", 
            login_btn: "Login", 
            no_account: "Don't have an account?", 
            register_now: "Register now", 
            demo_note: "Demo4Professor: you can register a new user or use matteo.golinelli@studenti.unitn.it (ADMIN) with password \"password\" or use robin.bertolini@studenti.unitn.it (INSPECTOR) with password \"password\" or use virginia.ancora@studenti.unitn.it/caterina.alessi@studenti.unitn.it (PASSENGERs) with password \"password2\"", 
            cookie_text: "🍪 This site uses cookies to improve your experience.", 
            accept: "Accept", 
            reject: "Reject" 
        },
        de: { 
            title: "🔐 Anmelden", 
            login_btn: "Anmelden", 
            no_account: "Kein Konto?", 
            register_now: "Jetzt registrieren", 
            demo_note: "Demo4Professor: Sie können einen neuen Benutzer registrieren oder matteo.golinelli@studenti.unitn.it (ADMIN) mit dem Passwort \"password\" verwenden o oder robin.bertolini@studenti.unitn.it (INSPECTOR) mit dem Passwort \"password2\" verwenden oder virginia.ancora@studenti.unitn.it/caterina.alessi@studenti.unitn.it (PASSENGERs) mit dem Passwort \"password\" verwenden", 
            cookie_text: "🍪 Diese Website verwendet Cookies, um Ihr Erlebnis zu verbessern.", 
            accept: "Akzeptieren", 
            reject: "Ablehnen" 
        }
    };
    let currentLang = localStorage.getItem('lang') || 'it';
    function setLanguage(lang) {
        currentLang = lang; localStorage.setItem('lang', lang);
        document.querySelectorAll('[data-i18n]').forEach(el => { const key = el.getAttribute('data-i18n'); if (translations[lang] && translations[lang][key]) el.innerText = translations[lang][key]; });
        const token = localStorage.getItem('token'); if (token) fetch('/api/language', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ language: lang }) }).catch(e=>console.warn);
    }
    document.getElementById('langSelect').value = currentLang; setLanguage(currentLang);
    document.getElementById('langSelect').addEventListener('change', e => setLanguage(e.target.value));

    // ----- LOGIN -----
    const loginBtn = document.getElementById('loginBtn');
    const msgDiv = document.getElementById('message');
    loginBtn.onclick = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        msgDiv.innerHTML = '<div class="info">⏳ Caricamento...</div>';
        try {
            const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
            const data = await res.json();
            if (res.ok && data.success) {
                localStorage.setItem('token', data.token); localStorage.setItem('userId', data.user.id); localStorage.setItem('userRole', data.user.role);
                msgDiv.innerHTML = `<div class="success">✅ Login riuscito! Redirect in corso...</div>`;
                setTimeout(() => {
                    if (data.user.role === 'administrator') window.location.href = 'admin.html';
                    else if (data.user.role === 'inspector') window.location.href = 'inspector.html';
                    else window.location.href = 'dashboard.html';
                }, 1500);
            } else msgDiv.innerHTML = `<div class="error">❌ ${data.message || 'Credenziali errate'}</div>`;
        } catch (err) { msgDiv.innerHTML = `<div class="error">⚠️ Errore di connessione: ${err.message}</div>`; }
    };

    // Cookie banner
    if (!localStorage.getItem('cookieChoice')) document.getElementById('cookieBanner').style.display = 'block';
    document.getElementById('acceptCookies').onclick = () => {
        localStorage.setItem('cookieChoice', 'accepted');
        document.getElementById('cookieBanner').style.display = 'none';
        alert(translations[currentLang]?.cookie_accept_msg || 'Grazie, i tuoi dati verranno usati per la ricerca del gruppo 104 in un server molto sicuro (quello di Matteo)');
    };
    document.getElementById('rejectCookies').onclick = () => {
        localStorage.setItem('cookieChoice', 'rejected');
        document.getElementById('cookieBanner').style.display = 'none';
        alert(translations[currentLang]?.cookie_reject_msg || 'ok, chill va bene lo stesso :(');
    };
</script>
</body>
</html>
