<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Supporto</title>
    <style>
        body { font-family: system-ui; background: #f0f2f5; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; border-radius: 24px; padding: 24px; }
        textarea, select, input, button { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; }
        button { background: #0066cc; color: white; font-weight: bold; border: none; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h2>📞 Contatta il supporto</h2>
    <select id="type">
        <option value="refund">Rimborso</option>
        <option value="information">Informazioni</option>
        <option value="complaint">Reclamo</option>
    </select>
    <input id="ticketRef" placeholder="Numero biglietto (opzionale)">
    <textarea id="desc" rows="4" placeholder="Descrivi il problema..."></textarea>
    <button id="send">Invia richiesta</button>
    <div id="result"></div>
</div>
<script>
    const userId = localStorage.getItem('userId') || 1001;
    document.getElementById('send').onclick = async () => {
        const res = await fetch('/api/support', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                userId: parseInt(userId),
                requestType: document.getElementById('type').value,
                ticketRef: document.getElementById('ticketRef').value,
                description: document.getElementById('desc').value
            })
        });
        const data = await res.json();
        document.getElementById('result').innerHTML = data.success ? '✅ Richiesta inviata' : '❌ Errore';
    };
</script>
</body>
</html>
