<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: system-ui; background: #f0f2f5; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; border-radius: 24px; padding: 24px; }
        .stats-grid { display: flex; gap: 20px; flex-wrap: wrap; margin: 20px 0; }
        .stat-card { background: #1e3c72; color: white; padding: 20px; border-radius: 16px; flex: 1; text-align: center; }
        button { background: #0066cc; color: white; padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h2>📊 Statistiche Amministratore</h2>
    <button id="refresh">Aggiorna</button>
    <div class="stats-grid" id="stats"></div>
</div>
<script>
    async function loadStats() {
        const res = await fetch('/api/admin/stats');
        const data = await res.json();
        document.getElementById('stats').innerHTML = `
            <div class="stat-card">💰 Ricavi: ${data.revenue} €</div>
            <div class="stat-card">🎟️ Biglietti venduti: ${data.bookings}</div>
            <div class="stat-card">🚆 Treni in ritardo: ${data.delayedTrains}</div>
            <div class="stat-card">👥 Utenti attivi: ${data.activeUsers}</div>
        `;
    }
    document.getElementById('refresh').onclick = loadStats;
    loadStats();
</script>
</body>
</html>
