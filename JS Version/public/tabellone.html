<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">Tabellone Partenze</title>
    <link rel="icon" type="image/png" href="images/104okok.png">
    <link rel="stylesheet" href="/css/navbar.css">
    <style>
        body { font-family: system-ui; background: #f0f2f5; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; border-radius: 24px; padding: 24px; }
        select, button, input[type="date"] { padding: 10px; margin: 10px 0; width: 100%; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #0066cc; color: white; }
        .delayed { color: red; }
        .error { color: #d32f2f; background: #ffebee; padding: 12px; border-radius: 12px; margin-top: 20px; text-align: center; }
        .info-loading { background: #e3f2fd; padding: 12px; border-radius: 12px; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <div id="navbar"></div>
    <h2 data-i18n="title"> Tabellone Partenze</h2>
    <select id="stationSelect">
        <option value="" data-i18n="select_station">Seleziona stazione</option>
    </select>
    <input type="date" id="dateSelect">
    <button id="loadBtn" data-i18n="show_departures">Mostra partenze</button>
    <div id="board"></div>
</div>

<div id="cookieBanner" style="position: fixed; bottom: 0; left: 0; right: 0; background: #333; color: white; padding: 15px; text-align: center; z-index: 1000; display: none;">
    <span data-i18n="cookie_text"> Questo sito utilizza cookie per migliorare l'esperienza.</span>
    <button id="acceptCookies" style="margin-left: 15px;" data-i18n="accept">Accetta</button>
    <button id="rejectCookies" data-i18n="reject">Rifiuta</button>
</div>

<script src="/js/navbar.js"></script>
<script>
    // TRADUZIONI COMPLETE (navbar + pagina)
    const translations = {
        it: {
            // Navbar
            home: " Cerca treni", login: " Login", dashboard: " Dashboard", purchase: " Acquista",
            inspector: " Ispettore", admin: " Admin", support: " Supporto", status: " Stato treno",
            subscription: " Abbonamenti", tabellone: " Tabellone", logout: "Logout",
            // Pagina tabellone
            title: " Tabellone Partenze", select_station: "Seleziona stazione", show_departures: "Mostra partenze",
            no_departures: "Nessuna partenza per la data selezionata.", train: "Treno", destination: "Destinazione",
            time: "Orario", track: "Binario", status: "Stato", delayed: "Ritardo", minutes: "min",
            loading: "Caricamento in corso...",
            // Cookie
            cookie_text: " Questo sito utilizza cookie per migliorare l'esperienza.",
            accept: "Accetta", reject: "Rifiuta"
        },
        en: {
            // Navbar
            home: " Search trains", login: " Login", dashboard: " Dashboard", purchase: " Buy",
            inspector: " Inspector", admin: " Admin", support: " Support", status: " Train status",
            subscription: " Subscriptions", tabellone: " Departures", logout: "Logout",
            // Pagina tabellone
            title: " Departures Board", select_station: "Select station", show_departures: "Show departures",
            no_departures: "No departures for the selected date.", train: "Train", destination: "Destination",
            time: "Time", track: "Platform", status: "Status", delayed: "Delayed", minutes: "min",
            loading: "Loading...",
            // Cookie
            cookie_text: " This site uses cookies to improve your experience.",
            accept: "Accept", reject: "Reject"
        },
        de: {
            // Navbar
            home: " Zug suchen", login: " Anmelden", dashboard: " Dashboard", purchase: " Kaufen",
            inspector: " Schaffner", admin: " Admin", support: " Support", status: " Zugstatus",
            subscription: " Abos", tabellone: " Abfahrten", logout: "Logout",
            // Pagina tabellone
            title: " Abfahrttafel", select_station: "Bahnhof auswählen", show_departures: "Abfahrten anzeigen",
            no_departures: "Keine Abfahrten für das ausgewählte Datum.", train: "Zug", destination: "Ziel",
            time: "Zeit", track: "Gleis", status: "Status", delayed: "Verspätung", minutes: "min",
            loading: "Laden...",
            // Cookie
            cookie_text: " Diese Website verwendet Cookies, um Ihr Erlebnis zu verbessern.",
            accept: "Akzeptieren", reject: "Ablehnen"
        }
    };

    let currentLang = localStorage.getItem('lang') || 'it';

    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('lang', lang);
        // Traduci elementi statici con data-i18n
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (translations[lang] && translations[lang][key]) {
                // Per i select, traduciamo solo le option con data-i18n (es. la prima opzione vuota)
                if (el.tagName === 'SELECT') {
                    el.querySelectorAll('option[data-i18n]').forEach(opt => {
                        const optKey = opt.getAttribute('data-i18n');
                        if (translations[lang][optKey]) opt.innerText = translations[lang][optKey];
                    });
                } else {
                    el.innerText = translations[lang][key];
                }
            }
        });
        const token = localStorage.getItem('token');
        if (token) {
            fetch('/api/language', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ language: lang }) }).catch(e => console.warn);
        }
    }

    // Inizializza navbar e lingua
    setLanguage(currentLang);
    renderNavbar();

    // Ora la logica della pagina (invariata)
    const stationSelect = document.getElementById('stationSelect');
    const dateInput = document.getElementById('dateSelect');
    const boardDiv = document.getElementById('board');
    const loadBtn = document.getElementById('loadBtn');

    // Imposta data odierna
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    dateInput.value = `${yyyy}-${mm}-${dd}`;

    // Carica stazioni
    async function loadStations() {
        try {
            const res = await fetch('/api/stations');
            if (!res.ok) throw new Error('Errore nel caricamento stazioni');
            const stations = await res.json();
            stationSelect.innerHTML = `<option value="" data-i18n="select_station">${translations[currentLang].select_station}</option>`;
            stations.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.stationId;
                opt.textContent = `${s.name} (${s.city})`;
                stationSelect.appendChild(opt);
            });
        } catch (err) {
            console.error('Errore caricamento stazioni:', err);
            boardDiv.innerHTML = `<div class="error">❌ Impossibile caricare le stazioni: ${err.message}</div>`;
        }
    }

    async function loadDepartures() {
        const stationId = stationSelect.value;
        const date = dateInput.value;
        if (!stationId) {
            boardDiv.innerHTML = `<div class="error">⚠️ Seleziona una stazione.</div>`;
            return;
        }
        if (!date) {
            boardDiv.innerHTML = `<div class="error">⚠️ Seleziona una data.</div>`;
            return;
        }

        boardDiv.innerHTML = `<div class="info-loading">⏳ ${translations[currentLang].loading || 'Caricamento...'}</div>`;

        try {
            const res = await fetch(`/api/departures/${stationId}?date=${date}`);
            if (!res.ok) {
                const text = await res.text();
                throw new Error(`HTTP ${res.status}: ${text}`);
            }
            const departures = await res.json();
            console.log('Dati ricevuti:', departures);

            if (!Array.isArray(departures) || departures.length === 0) {
                boardDiv.innerHTML = `<div class="error">${translations[currentLang].no_departures}</div>`;
                return;
            }

            boardDiv.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>${translations[currentLang].train}</th>
                            <th>${translations[currentLang].destination}</th>
                            <th>${translations[currentLang].time}</th>
                            <th>${translations[currentLang].track}</th>
                            <th>${translations[currentLang].status}</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${departures.map(d => `
                            <tr>
                                <td>${d.trainCode || d.train || '--'}</td>
                                <td>${d.destination || '--'}</td>
                                <td>${d.scheduledDeparture || d.departureTime || '--'}</td>
                                <td>${d.track || '--'}</td>
                                <td class="${(d.delay || 0) > 0 ? 'delayed' : ''}">
                                    ${d.status || 'In orario'}
                                    ${(d.delay || 0) > 0 ? ` (+${d.delay} ${translations[currentLang].minutes})` : ''}
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        } catch (err) {
            console.error('Errore durante il caricamento delle partenze:', err);
            boardDiv.innerHTML = `<div class="error">❌ Errore: ${err.message}</div>`;
        }
    }

    // Eventi
    loadBtn.addEventListener('click', loadDepartures);
    stationSelect.addEventListener('change', loadDepartures);
    dateInput.addEventListener('change', loadDepartures);

    // Carica stazioni e, se già selezionata una stazione, carica le partenze
    loadStations().then(() => {
        if (stationSelect.value) {
            loadDepartures();
        }
    });

    // Cookie banner
    if (!localStorage.getItem('cookieChoice')) {
        document.getElementById('cookieBanner').style.display = 'block';
    }
    document.getElementById('acceptCookies').onclick = () => {
        localStorage.setItem('cookieChoice', 'accepted');
        document.getElementById('cookieBanner').style.display = 'none';
        alert(translations[currentLang]?.cookie_accept_msg || 'Grazie, i tuoi dati verranno usati per la ricerca del gruppo 104 in un server molto sicuro (quello di Matteo)');
    };
    document.getElementById('rejectCookies').onclick = () => {
        localStorage.setItem('cookieChoice', 'rejected');
        document.getElementById('cookieBanner').style.display = 'none';
        alert(translations[currentLang]?.cookie_reject_msg || 'ok, chill va bene lo stesso :(');
    };
</script>
</body>
</html>
