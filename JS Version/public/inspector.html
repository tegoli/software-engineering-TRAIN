<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Area Ispettore</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f0f2f5; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: white; border-radius: 24px; padding: 24px; }
        button, input { padding: 10px; border-radius: 8px; margin: 5px; }
        button { background: #0066cc; color: white; border: none; cursor: pointer; }
        .card { background: #e9ecef; padding: 16px; border-radius: 16px; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h2>👮 Pannello Ispettore</h2>
    <div class="card">
        <h3>✅ Validazione biglietto</h3>
        <input type="text" id="ticketCode" placeholder="Codice biglietto o QR">
        <button id="validateBtn">Valida</button>
        <div id="validationResult"></div>
    </div>

    <div class="card">
        <h3>🚉 Aggiorna occupazione</h3>
        <input type="number" id="coach" placeholder="Numero carrozza">
        <input type="number" id="passengers" placeholder="Passeggeri a bordo">
        <button id="occupyBtn">Invia occupazione</button>
    </div>

    <div class="card">
        <h3>📅 Turni di lavoro</h3>
        <button id="scheduleBtn">Visualizza turni</button>
        <div id="scheduleResult"></div>
    </div>
</div>
<script>
    document.getElementById('validateBtn').onclick = async () => {
        const ticketId = document.getElementById('ticketCode').value;
        const res = await fetch('/api/validate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ticketId })
        });
        const data = await res.json();
        document.getElementById('validationResult').innerHTML = data.valid ? '✅ Biglietto valido' : '❌ Biglietto non valido o già utilizzato';
    };

    document.getElementById('occupyBtn').onclick = async () => {
        await fetch('/api/notify-delay', { method: 'POST', body: JSON.stringify({ trainId: 1, delayTime: 0 }) }); // mock
        alert('Occupazione aggiornata (mock)');
    };

    document.getElementById('scheduleBtn').onclick = async () => {
        const res = await fetch('/api/schedule/1');
        const data = await res.json();
        document.getElementById('scheduleResult').innerHTML = data.shifts.map(s => `<p>🚆 Treno ${s.train} alle ${s.time}</p>`).join('');
    };
</script>
</body>
</html>
