<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Area Ispettore</title>
    <style>
        body { font-family: system-ui; background: #f0f2f5; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: white; border-radius: 24px; padding: 24px; }
        button, input { padding: 10px; margin: 5px; border-radius: 8px; }
        button { background: #0066cc; color: white; border: none; cursor: pointer; }
        .card { background: #e9ecef; padding: 16px; border-radius: 16px; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h2>👮 Pannello Ispettore</h2>
    <div class="card">
        <h3>✅ Validazione biglietto</h3>
        <input type="number" id="ticketId" placeholder="ID biglietto">
        <button id="validateBtn">Valida</button>
        <div id="validationResult"></div>
    </div>
    <div class="card">
        <h3>📅 Turni (ID ispettore 3001)</h3>
        <button id="scheduleBtn">Visualizza turni</button>
        <div id="scheduleResult"></div>
    </div>
</div>
<script>
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('userRole');
    if (!token || role !== 'inspector') {
        alert('Accesso negato. Devi fare login come ispettore.');
        window.location.href = 'login.html';
    }
    document.getElementById('validateBtn').onclick = async () => {
        const ticketId = document.getElementById('ticketId').value;
        const res = await fetch('/api/validate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ ticketId: parseInt(ticketId) })
        });
        const data = await res.json();
        document.getElementById('validationResult').innerHTML = data.valid ? '✅ Biglietto valido' : '❌ ' + data.message;
    };
    document.getElementById('scheduleBtn').onclick = async () => {
        const res = await fetch('/api/inspector/schedule/3001', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if (data.shifts) {
            document.getElementById('scheduleResult').innerHTML = data.shifts.map(s => `<p>📅 ${s.date} ${s.startTime}-${s.endTime} - ${s.route} (${s.trainCode})</p>`).join('');
        } else {
            document.getElementById('scheduleResult').innerHTML = '<div class="error">Errore nel caricamento turni</div>';
        }
    };
</script>
</body>
</html>
