<!DOCTYPE html>
<html>
<head>
    <title>Mappa Stazioni Ferroviarie Nord Italia</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="map.css">
</head>
<body>
    <div id="map"></div>
    <div class="stats-panel" id="station-count">Caricamento stazioni...</div>
    <div class="legend" id="legend">
        <h4>🚉 Stazioni Ferroviarie</h4>
        <div class="legend-item">
            <div style="width:12px; height:12px; border-radius:50%; background:#3388ff; border:1.5px solid #0066cc; margin-right:8px; flex-shrink:0;"></div>
            Stazione
        </div>
    </div>
    <!-- 1) Stazioni (definisce anche la variabile `map`) -->
    <script src="map_stations.js"></script>

    <!-- 2) Linee ferroviarie da Overpass API (usa `map` già definita) -->
    <script src="map_lines.js"></script>
</body>
</html>
